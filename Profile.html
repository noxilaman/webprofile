<style>
  :root {
    /* refined dark slate — lighter than pure black */
    --bg:        #0f141b;
    --bg-2:      #141a23;
    --raised:    #181f29;
    --panel:     #1c2532;
    --border:    #28323f;
    --border-2:  #323e4d;

    --text:      #e7eef6;
    --text-2:    #aeb9c6;
    --dim:       #7b8794;
    --mute:      #5d6873;

    --green:     #4ade80;
    --green-2:   #34d399;
    --green-dim: #1f3d2e;
    --blue:      #6db3ff;
    --amber:     #f5c451;

    --font-disp: "Space Grotesk", system-ui, sans-serif;
    --font-body: "IBM Plex Sans", system-ui, sans-serif;
    --font-mono: "IBM Plex Mono", ui-monospace, monospace;

    --maxw: 1080px;
    --pad: 28px;
  }

  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 16px;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    overflow-x: clip;
  }
  html { overflow-x: clip; }
  /* faint global grid texture */
  body::before {
    content: "";
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image:
      linear-gradient(rgba(120,140,160,.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(120,140,160,.035) 1px, transparent 1px);
    background-size: 44px 44px;
    mask-image: radial-gradient(ellipse 90% 60% at 50% 0%, #000 30%, transparent 80%);
  }
  main, .nav, .footer { position: relative; z-index: 1; }

  .mono { font-family: var(--font-mono); }
  .accent { color: var(--green); }
  .dim { color: var(--dim); }
  a { color: inherit; text-decoration: none; }

  .caret {
    display: inline-block; width: 8px; height: 1.05em;
    background: var(--green); margin-left: 3px; vertical-align: -2px;
    animation: blink 1.1s steps(1) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* ---------- buttons ---------- */
  .btn {
    font-family: var(--font-mono); font-size: 13px; font-weight: 500;
    padding: 11px 18px; border-radius: 8px; border: 1px solid transparent;
    cursor: pointer; transition: all .16s ease; letter-spacing: .2px; white-space: nowrap;
  }
  .btn-primary { background: var(--green); color: #07130c; border-color: var(--green); font-weight: 600; }
  .btn-primary:hover { background: var(--green-2); transform: translateY(-1px); box-shadow: 0 6px 20px -8px var(--green); }
  .btn-ghost { background: transparent; color: var(--text); border-color: var(--border-2); }
  .btn-ghost:hover { border-color: var(--green); color: var(--green); }

  /* ---------- nav ---------- */
  .nav {
    position: sticky; top: 0; z-index: 40;
    background: color-mix(in srgb, var(--bg) 82%, transparent);
    backdrop-filter: blur(14px) saturate(1.2);
    border-bottom: 1px solid var(--border);
  }
  .nav-inner {
    max-width: var(--maxw); margin: 0 auto; padding: 13px var(--pad);
    display: flex; align-items: center; gap: 24px;
  }
  .brand { font-size: 15px; font-weight: 600; color: var(--text); white-space: nowrap; }
  .nav-links { display: flex; gap: 22px; margin-left: auto; font-size: 13px; }
  .nav-links a { color: var(--text-2); transition: color .15s; position: relative; }
  .nav-links a:hover { color: var(--green); }
  .nav-right { display: flex; align-items: center; gap: 14px; }
  .lang-toggle { display: flex; border: 1px solid var(--border-2); border-radius: 7px; overflow: hidden; }
  .lang-toggle button {
    background: transparent; border: 0; color: var(--dim); font-family: var(--font-mono);
    font-size: 12px; padding: 7px 10px; cursor: pointer; transition: all .14s;
  }
  .lang-toggle button.on { background: var(--green); color: #07130c; font-weight: 600; }
  .lang-toggle button:not(.on):hover { color: var(--text); }

  /* ---------- hero ---------- */
  .hero { max-width: var(--maxw); margin: 0 auto; padding: 64px var(--pad) 0; position: relative; }
  .hero-grid-bg { display: none; }
  .hero-inner { display: grid; grid-template-columns: 1.15fr .85fr; gap: 48px; align-items: center; }
  .avail {
    display: inline-flex; align-items: center; gap: 9px; font-size: 12.5px;
    padding: 6px 13px; border-radius: 100px; border: 1px solid var(--border-2);
    color: var(--text-2); margin-bottom: 26px; width: fit-content;
  }
  .avail .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--dim); }
  .avail.is-on { color: var(--green); border-color: var(--green-dim); background: rgba(74,222,128,.06); }
  .avail.is-on .dot { background: var(--green); box-shadow: 0 0 0 0 rgba(74,222,128,.5); animation: pulse 2s infinite; }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(74,222,128,.45); }
    70% { box-shadow: 0 0 0 7px rgba(74,222,128,0); }
    100% { box-shadow: 0 0 0 0 rgba(74,222,128,0); }
  }
  .hero-name {
    font-family: var(--font-disp); font-weight: 700; font-size: clamp(40px, 6.4vw, 72px);
    line-height: 1.02; letter-spacing: -1.5px; margin: 0 0 16px;
  }
  .hero-role { font-size: 15px; margin-bottom: 22px; font-weight: 500; }
  .hero-pitch { font-size: clamp(17px, 2vw, 20px); color: var(--text-2); max-width: 30ch; line-height: 1.5; margin: 0 0 30px; text-wrap: pretty; }
  .hero-actions { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 24px; }
  .hero-meta { display: flex; gap: 18px; font-size: 13px; }

  /* terminal card */
  .term-card {
    background: var(--raised); border: 1px solid var(--border); border-radius: 12px;
    overflow: hidden; box-shadow: 0 24px 60px -24px rgba(0,0,0,.7);
  }
  .term-bar {
    display: flex; align-items: center; gap: 7px; padding: 11px 14px;
    background: var(--bg-2); border-bottom: 1px solid var(--border);
  }
  .tdot { width: 11px; height: 11px; border-radius: 50%; }
  .tdot.r { background: #ff5f56; } .tdot.y { background: #ffbd2e; } .tdot.g { background: #27c93f; }
  .term-title { margin-left: 8px; font-size: 12px; color: var(--dim); }
  .term-body { padding: 20px; display: flex; gap: 18px; align-items: center; }
  .avatar-wrap { flex-shrink: 0; }
  .avatar-img, .avatar-mono {
    width: 96px; height: 96px; border-radius: 12px; object-fit: cover;
    border: 1px solid var(--border-2);
  }
  .avatar-mono {
    display: grid; place-items: center; font-family: var(--font-mono); font-size: 34px;
    font-weight: 600; color: var(--green); background: var(--green-dim);
  }
  .term-lines { font-size: 12.5px; line-height: 1.85; min-width: 0; }
  .term-lines .wrap { color: var(--text-2); }

  /* metrics */
  .metrics {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px;
    background: var(--border); border: 1px solid var(--border); border-radius: 12px;
    overflow: hidden; margin-top: 56px;
  }
  .metric { background: var(--bg); padding: 22px 20px; text-align: left; }
  .metric-val { font-family: var(--font-disp); font-size: 30px; font-weight: 700; letter-spacing: -1px; }
  .metric-label { font-size: 11.5px; margin-top: 4px; text-transform: uppercase; letter-spacing: .5px; }

  /* ---------- summary ---------- */
  .summary {
    max-width: var(--maxw); margin: 72px auto; padding: 0 var(--pad);
    display: flex; gap: 14px; align-items: flex-start;
  }
  .summary p { font-size: clamp(19px, 2.4vw, 26px); line-height: 1.5; font-family: var(--font-disp); font-weight: 400; color: var(--text); margin: 0; text-wrap: pretty; }
  .quote-mark { font-size: 22px; flex-shrink: 0; padding-top: 4px; }
  .quote-mark.end { align-self: flex-end; }

  /* ---------- generic block ---------- */
  .block { max-width: var(--maxw); margin: 0 auto; padding: 40px var(--pad); }
  .sec-head { margin-bottom: 32px; }
  .sec-kicker { display: flex; gap: 10px; font-size: 12.5px; margin-bottom: 10px; align-items: center; }
  .sec-title { font-family: var(--font-disp); font-size: clamp(26px, 3.4vw, 36px); font-weight: 600; letter-spacing: -.8px; margin: 0; }

  /* ---------- timeline ---------- */
  .timeline { position: relative; padding-left: 26px; }
  .timeline::before { content: ""; position: absolute; left: 4px; top: 6px; bottom: 6px; width: 1px; background: var(--border-2); }
  .tl-item { position: relative; margin-bottom: 18px; }
  .tl-node {
    position: absolute; left: -26px; top: 24px; width: 9px; height: 9px; border-radius: 50%;
    background: var(--bg); border: 2px solid var(--border-2); transform: translateX(0);
  }
  .tl-item.current .tl-node { background: var(--green); border-color: var(--green); box-shadow: 0 0 0 4px rgba(74,222,128,.14); }
  .tl-card {
    background: var(--raised); border: 1px solid var(--border); border-radius: 12px;
    padding: 22px 24px; transition: border-color .18s, transform .18s;
  }
  .tl-card:hover { border-color: var(--border-2); transform: translateX(2px); }
  .tl-top { display: flex; justify-content: space-between; gap: 16px; margin-bottom: 14px; flex-wrap: wrap; }
  .tl-role { font-family: var(--font-disp); font-size: 19px; font-weight: 600; }
  .tl-co { font-size: 13.5px; margin-top: 2px; }
  .tl-meta { text-align: right; font-size: 12.5px; line-height: 1.7; }
  .tl-period { color: var(--text-2); }
  .tl-points { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 9px; }
  .tl-points li { display: flex; gap: 10px; font-size: 14.5px; color: var(--text-2); line-height: 1.5; }
  .bullet { flex-shrink: 0; font-size: 12px; padding-top: 2px; }
  .chips { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 16px; }
  .chip {
    font-size: 11.5px; padding: 4px 9px; border-radius: 6px; color: var(--text-2);
    background: var(--bg-2); border: 1px solid var(--border);
  }
  .chip.lg { font-size: 13px; padding: 7px 12px; color: var(--text); }
  .wrap-chips { margin-top: 12px; }

  /* ---------- projects ---------- */
  .proj-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .proj-card {
    background: var(--raised); border: 1px solid var(--border); border-radius: 12px;
    display: flex; flex-direction: column; transition: all .18s;
    position: relative; overflow: hidden;
  }
  .proj-card::after {
    content: ""; position: absolute; inset: 0 0 auto 0; height: 2px;
    background: linear-gradient(90deg, var(--green), transparent); opacity: 0; transition: opacity .2s; z-index: 2;
  }
  .proj-card:hover { border-color: var(--border-2); transform: translateY(-3px); box-shadow: 0 18px 40px -24px rgba(0,0,0,.7); }
  .proj-card:hover::after { opacity: 1; }
  .proj-viz { position: relative; height: 132px; border-bottom: 1px solid var(--border); overflow: hidden; background: var(--bg-2); }
  .proj-viz img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .proj-viz .viz-tag {
    position: absolute; left: 12px; bottom: 10px; font-size: 10px; letter-spacing: .5px;
    color: var(--green); background: rgba(7,19,12,.6); border: 1px solid rgba(74,222,128,.25);
    padding: 2px 7px; border-radius: 5px; backdrop-filter: blur(4px); text-transform: uppercase;
  }
  .proj-viz.gen::after {
    content: ""; position: absolute; inset: 0; pointer-events: none;
    background: radial-gradient(120% 80% at 80% 0%, transparent 40%, rgba(14,20,25,.5) 100%);
  }
  .proj-body { padding: 20px 22px 22px; display: flex; flex-direction: column; flex: 1; }
  .proj-head { display: flex; align-items: baseline; gap: 8px; font-size: 14px; margin-bottom: 8px; }
  .proj-meta { font-size: 11.5px; margin-bottom: 11px; letter-spacing: .2px; }
  .proj-name { font-weight: 600; color: var(--text); font-size: 16px; }
  .proj-year { margin-left: auto; font-size: 12px; }
  .proj-tagline { font-size: 13px; margin-bottom: 12px; }
  .proj-desc { font-size: 14px; color: var(--text-2); line-height: 1.55; margin: 0 0 16px; flex: 1; }
  .proj-impact {
    display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px;
    background: var(--green-dim); border: 1px solid rgba(74,222,128,.18); margin-bottom: 14px;
  }
  .impact-label { font-size: 10.5px; text-transform: uppercase; letter-spacing: .6px; }
  .impact-val { font-size: 13px; color: var(--green); font-weight: 500; }

  /* ---------- skills ---------- */
  .skills-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .skill-group { background: var(--raised); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
  .skill-group-title { font-size: 13px; margin-bottom: 4px; }

  /* ---------- certificates ---------- */
  .cert-list { display: flex; flex-direction: column; gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .cert-row { display: flex; align-items: center; gap: 16px; padding: 16px 20px; background: var(--raised); transition: background .15s; }
  .cert-row:hover { background: var(--panel); }
  .cert-badge {
    width: 30px; height: 30px; border-radius: 7px; display: grid; place-items: center; flex-shrink: 0;
    background: var(--green-dim); color: var(--green); border: 1px solid rgba(74,222,128,.25); font-size: 14px;
  }
  .cert-main { flex: 1; min-width: 0; }
  .cert-name { font-size: 15px; font-weight: 500; }
  .cert-sub { font-size: 12px; margin-top: 1px; }
  .cert-year { font-size: 14px; flex-shrink: 0; }

  /* ---------- side ---------- */
  .side-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .side-card {
    background: var(--raised); border: 1px solid var(--border); border-radius: 12px;
    padding: 22px; display: block; transition: all .18s;
  }
  .side-card.is-link:hover { border-color: var(--green); transform: translateY(-3px); }
  .side-type { font-size: 11.5px; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 12px; }
  .side-name { font-family: var(--font-disp); font-size: 18px; font-weight: 600; margin-bottom: 8px; }
  .side-desc { font-size: 13.5px; color: var(--text-2); line-height: 1.55; margin: 0 0 14px; }
  .side-link { font-size: 12px; word-break: break-all; }

  /* ---------- contact ---------- */
  .contact { text-align: center; padding-top: 56px; padding-bottom: 56px; }
  .contact .sec-head { display: inline-block; text-align: left; }
  .contact-blurb { font-family: var(--font-disp); font-size: clamp(20px, 3vw, 30px); font-weight: 500; max-width: 22ch; margin: 0 auto 28px; line-height: 1.35; letter-spacing: -.5px; }
  .contact-mail {

  .contact-mail:hover { opacity: .8; }
  .contact-links { display: flex; justify-content: center; flex-wrap: wrap; gap: 12px; }
  .contact-links a {
    display: inline-flex; align-items: center; gap: 9px; font-size: 13px; color: var(--text-2);
    padding: 9px 16px; border: 1px solid var(--border); border-radius: 8px; transition: all .15s;

  .contact-links a:hover { border-color: var(--green); color: var(--green); }
  .ci { color: var(--dim); font-size: 13px; }

    display: flex; justify-content: space-between; font-size: 12.5px; border-top: 1px solid var(--border);
    flex-wrap: wrap; gap: 10px;

  /* ---------- admin FAB ---------- */
